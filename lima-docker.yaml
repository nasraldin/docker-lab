# Debian 13 (Trixie) + rootless Docker for Lima 2.x
# Prefer: make lima   or   make install
# Manual: limactl start --name=docker ./lima-docker.yaml
# Tune cpus/memory/disk below for smaller hosts before first create.

minimumLimaVersion: 2.0.0

base:
  - template:_images/debian-13
  - template:_default/mounts

arch: aarch64
cpus: 8
memory: 24GiB
disk: 200GiB
vmType: vz

vmOpts:
  vz:
    rosetta:
      enabled: true
      binfmt: true

mounts:
  - location: "~"
    writable: true

# containerd is managed by Docker, not by Lima
containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/sh
      sed -i 's/host.lima.internal.*/host.lima.internal host.docker.internal/' /etc/hosts
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y \
        curl \
        git \
        vim \
        htop \
        jq \
        net-tools \
        ca-certificates
      command -v docker >/dev/null 2>&1 && exit 0
      curl -fsSL https://get.docker.com | sh
      # Rootless docker (remove the next two lines for rootful)
      systemctl disable --now docker.service docker.socket containerd.service containerd.socket || true
      systemctl mask docker.service docker.socket containerd.service containerd.socket || true
      apt-get install -y uidmap dbus-user-session
  - mode: yq
    path: "{{.Home}}/.config/docker/daemon.json"
    expression: |
      .features.cdi = true |
      .features.containerd-snapshotter = {{.Param.containerdSnapshotter}} |
      .["log-driver"] = "json-file" |
      .["log-opts"]["max-size"] = "10m" |
      .["log-opts"]["max-file"] = "3"
    owner: "{{.User}}"
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail
      systemctl --user start dbus
      dockerd-rootless-setuptool.sh install
      docker context use rootless

probes:
  - script: |
      #!/bin/bash
      set -eux -o pipefail
      if ! timeout 30s bash -c "until command -v docker >/dev/null 2>&1; do sleep 3; done"; then
        echo >&2 "docker is not installed yet"
        exit 1
      fi
      if ! timeout 30s bash -c "until pgrep rootlesskit; do sleep 3; done"; then
        echo >&2 "rootlesskit (used by rootless docker) is not running"
        exit 1
      fi
    hint: See "/var/log/cloud-init-output.log" in the guest

hostResolver:
  hosts:
    host.docker.internal: host.lima.internal

portForwards:
  - guestSocket: "/run/user/{{.UID}}/docker.sock"
    hostSocket: "{{.Dir}}/sock/docker.sock"

message: |
  To run `docker` on the host (assumes docker-cli is installed), run the following commands:
  ------
  docker context create lima-{{.Name}} --docker "host=unix://{{.Dir}}/sock/docker.sock"
  docker context use lima-{{.Name}}
  docker run hello-world
  ------

param:
  containerdSnapshotter: true
