  <line x1="876" y1="76.0" x2="896" y2="76.0" stroke="#00897B" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="900" y="48" width="118" height="56" rx="8" fill="#2E7D32"/>
  <text class="label-w" x="959.0" y="77.0" text-anchor="middle">Ready</text>
