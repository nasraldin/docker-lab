<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="568" height="480" viewBox="0 0 568 480" role="img" aria-label="Docker Lab stack diagram">
  <defs>
    <style>
      .title { font: 700 15px 'IBM Plex Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #1A2332; }
      .label { font: 600 13px 'IBM Plex Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #1A2332; }
      .label-w { font: 600 13px 'IBM Plex Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #FFFFFF; }
      .small { font: 500 11px 'IBM Plex Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: #5A6A7A; }
      .small-w { font: 500 11px 'IBM Plex Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif; fill: rgba(255,255,255,0.9); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00897B"/>
    </marker>
  </defs>
  <rect width="568" height="480" rx="12" fill="#FAFBFC"/>
  <text class="title" x="24" y="24">How the stack fits together</text>
  <rect x="24" y="40" width="520" height="420" rx="12" fill="#00695C"/>
  <text class="label-w" x="40" y="66">macOS (Apple Silicon)</text>
  <text class="small-w" x="40" y="84">host</text>
  <rect x="44" y="100" width="480" height="72" rx="10" fill="#00897B"/>
  <text class="label-w" x="60" y="128">Homebrew</text>
  <text class="small-w" x="60" y="148">limactl · docker CLI · compose · buildx</text>
  <rect x="64" y="192" width="440" height="44" rx="10" fill="#FF8F00"/>
  <text class="label-w" x="284" y="219" text-anchor="middle">DOCKER_HOST → ~/.lima/docker/sock/docker.sock</text>
  <rect x="64" y="256" width="440" height="184" rx="10" fill="#00897B"/>
  <text class="label-w" x="80" y="280">Lima VM · vz + virtiofs + Rosetta</text>
  <rect x="84" y="296" width="400" height="36" rx="6" fill="#00695C"/>
  <text class="label-w" x="284" y="319" text-anchor="middle">Debian 13 (aarch64)</text>
  <rect x="104" y="344" width="360" height="32" rx="6" fill="#00796B"/>
  <text class="label-w" x="284" y="365" text-anchor="middle">Docker Engine (rootless)</text>
  <rect x="124" y="388" width="320" height="28" rx="6" fill="#00695C"/>
  <text class="label-w" x="284" y="407" text-anchor="middle">containerd + runc → containers</text>
  <text class="small-w" x="40" y="444">Validated against Lima 2.x and Docker 29.x</text>
</svg>
