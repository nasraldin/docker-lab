site_name: Docker Lab
site_description: Production-grade local Platform Engineering environment for Apple Silicon
site_author: Nasr Aldin
site_url: https://nasraldin.github.io/docker-lab/

repo_name: nasraldin/docker-lab
repo_url: https://github.com/nasraldin/docker-lab
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Nasr Aldin — MIT License

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/nasraldin/docker-lab
    - icon: fontawesome/solid/globe
      link: https://nasraldin.com

nav:
  - Home: index.md
  - Getting started:
      - Installation: installation.md
      - Comparison: comparison.md
      - FAQ: faq.md
  - Guides:
      - Architecture: architecture.md
      - Docker daemon: docker-daemon.md
      - Performance: performance.md
      - Advanced: advanced.md
  - Operations:
      - Troubleshooting: troubleshooting.md
      - Screenshots: screenshots/index.md
  - Project:
      - Roadmap: roadmap.md
      - Homebrew: homebrew.md
      - Docs site: docs-site.md
      - Releasing: releasing.md
