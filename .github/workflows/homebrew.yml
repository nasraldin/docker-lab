name: Homebrew

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v1.0.0). Defaults to latest release."
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish-tap:
    name: Publish formula to homebrew-tools
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_TAG:-}" ]]; then
            TAG="${INPUT_TAG}"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="$(gh release view --json tagName -q .tagName)"
          fi
          [[ "${TAG}" == v* ]] || { echo "Tag must start with v (got ${TAG})" >&2; exit 1; }
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Publishing Homebrew formula for ${TAG}"

      - name: Check tap token
        id: token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
            echo "::warning::HOMEBREW_TAP_TOKEN secret is not set. Skipping tap publish."
            echo "See docs/homebrew.md for first-time setup."
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish to nasraldin/homebrew-tools
        if: steps.token.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: nasraldin/homebrew-tools
        run: |
          set -euo pipefail
          chmod +x scripts/publish-homebrew.sh
          ./scripts/publish-homebrew.sh "${{ steps.tag.outputs.tag }}"
